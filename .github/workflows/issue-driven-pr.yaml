name: "Codex Issue-Driven PR"
on:
  issues:
    types:
      - labeled

jobs:
  codex:
    if: github.event.label.name == 'codex-autofix'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set Codex auth.json from secret
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
            if [ -n "${CODEX_AUTH_JSON:-}" ]; then
              mkdir -p "$HOME/.codex"
              echo "$CODEX_AUTH_JSON" | tr -d '\n' | base64 -d > "$HOME/.codex/auth.json"
              chmod 600 "$HOME/.codex/auth.json"
            fi

      - name: Install Codex CLI
        run: |
          npm install -g @openai/codex@latest

      - name: Run Codex
        id: run_codex
        run: |
          PROMPT_FILE="$RUNNER_TEMP/codex-prompt.txt"
          FINAL_MESSAGE_FILE="$RUNNER_TEMP/codex-final-message.txt"

          cat > "$PROMPT_FILE" <<'EOF'
          次のIssue内容を元に、Branchの作成、コードの変更、Commitとpushを行ってPull Requestを作成してください。

          # Issue情報
          - Number: #${{ github.event.issue.number }}
          - Title: ${{ github.event.issue.title }}
          - URL: ${{ github.event.issue.html_url }}

          # Issue本文
          ${{ github.event.issue.body }}
          EOF

          codex exec \
            --dangerously-bypass-approvals-and-sandbox \
            --output-last-message "$FINAL_MESSAGE_FILE" \
            < "$PROMPT_FILE"

          {
            echo "final-message<<EOF"
            cat "$FINAL_MESSAGE_FILE"
            printf '\nEOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Comment result to issue
        if: always()
        uses: actions/github-script@v7
        env:
          FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        with:
          script: |
            const body = process.env.FINAL_MESSAGE
              ? `Codex completed the task.\n\n${process.env.FINAL_MESSAGE}`
              : 'Codex did not return a final message. Please check the workflow logs.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });
